name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true
      - run: uv sync --frozen --all-extras
      - run: uv lock --check
      - run: uv run ruff check . && uv run ruff format --check .
      - run: uv run mypy src
      - run: uv run pytest --cov=secure_data_clean_room --cov-report=xml
      - run: CLEAN_ROOM_DEMO_MODE=1 uv run clean-room benchmark --out /tmp/benchmark --iterations 3
      - run: cd /tmp/benchmark && sha256sum --check manifest.sha256
      - run: cd benchmarks/reference && sha256sum --check manifest.sha256
      - run: sha256sum --check benchmarks/reference/inputs.sha256
      - run: uv build --wheel --out-dir /tmp/wheel-dist
      - name: Smoke-test installed wheel outside the repository
        run: |
          uv venv --python 3.12 /tmp/clean-room-wheel-venv
          uv pip install --python /tmp/clean-room-wheel-venv/bin/python /tmp/wheel-dist/*.whl
          cd /tmp
          /tmp/clean-room-wheel-venv/bin/python "$GITHUB_WORKSPACE/scripts/wheel_smoke.py"
      - run: docker compose config --quiet
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: secure-data-clean-room-evidence
          path: |
            coverage.xml
            /tmp/benchmark

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          tags: secure-data-clean-room:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
