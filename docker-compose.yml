services:
  clean-room:
    build:
      context: .
    image: secure-data-clean-room:local
    environment:
      CLEAN_ROOM_DEMO_MODE: "1"
      CLEAN_ROOM_AUTO_INIT: "1"
      CLEAN_ROOM_DATA_DIR: /data
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - clean-room-data:/data
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 256m
    cpus: 1.0
    restart: unless-stopped

volumes:
  clean-room-data:
